name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-portable.txt
      - run: python -m pip install -r requirements-portable.txt
      - run: python -m unittest discover -s tests -p "test_*.py"
